<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="cambg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1C1C2E"/>
      <stop offset="100%" stop-color="#0D0D1A"/>
    </linearGradient>
    <radialGradient id="lens" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#6A8FBF"/>
      <stop offset="30%" stop-color="#2A4A7A"/>
      <stop offset="65%" stop-color="#0D2040"/>
      <stop offset="100%" stop-color="#050D1A"/>
    </radialGradient>
    <radialGradient id="lensshine" cx="35%" cy="35%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E2E2E"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#cambg)"/>
  <!-- Subtle bokeh circles -->
  <circle cx="50" cy="40" r="30" fill="#CBAE74" opacity="0.08"/>
  <circle cx="350" cy="200" r="50" fill="#CBAE74" opacity="0.06"/>
  <circle cx="320" cy="60" r="20" fill="#6A8FBF" opacity="0.1"/>
  <circle cx="80" cy="210" r="35" fill="#6A8FBF" opacity="0.07"/>
  <!-- Camera body -->
  <rect x="90" y="80" width="220" height="130" rx="16" fill="url(#body)"/>
  <rect x="92" y="82" width="216" height="126" rx="15" fill="none" stroke="#444" stroke-width="1"/>
  <!-- Viewfinder hump -->
  <rect x="145" y="60" width="80" height="25" rx="8" fill="#2E2E2E"/>
  <!-- Top buttons -->
  <circle cx="310" cy="92" r="8" fill="#1A1A1A" stroke="#555" stroke-width="1"/>
  <circle cx="310" cy="92" r="4" fill="#C8A96E"/>
  <!-- Shutter button -->
  <circle cx="330" cy="68" r="10" fill="#3A3A3A" stroke="#555" stroke-width="1"/>
  <circle cx="330" cy="68" r="6" fill="#C8A96E"/>
  <!-- Lens barrel -->
  <circle cx="200" cy="148" r="72" fill="#222"/>
  <circle cx="200" cy="148" r="68" fill="#1A1A1A" stroke="#333" stroke-width="2"/>
  <!-- Lens rings -->
  <circle cx="200" cy="148" r="62" fill="none" stroke="#3A3A3A" stroke-width="4"/>
  <circle cx="200" cy="148" r="54" fill="none" stroke="#2E2E2E" stroke-width="3"/>
  <!-- Main lens -->
  <circle cx="200" cy="148" r="48" fill="url(#lens)"/>
  <circle cx="200" cy="148" r="48" fill="url(#lensshine)"/>
  <!-- Lens reflection -->
  <ellipse cx="188" cy="136" rx="14" ry="10" fill="#FFFFFF" opacity="0.08" transform="rotate(-20 188 136)"/>
  <!-- Mode dial -->
  <circle cx="140" cy="75" r="14" fill="#2A2A2A" stroke="#444" stroke-width="1"/>
  <text x="140" y="80" text-anchor="middle" font-size="9" fill="#C8A96E" font-family="serif">A</text>
  <!-- LCD screen hint -->
  <rect x="240" y="100" width="55" height="38" rx="4" fill="#0A0F1A" stroke="#333" stroke-width="1"/>
  <rect x="243" y="103" width="49" height="32" rx="3" fill="#0D1520" opacity="0.8"/>
</svg>
