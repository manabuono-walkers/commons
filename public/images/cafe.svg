  <rect x="299" y="36" width="12" height="26" rx="3" fill="#C0392B"/>
  <rect x="321" y="33" width="15" height="29" rx="4" fill="#2C3E50"/>
  <!-- Bottles on second shelf -->
  <rect x="50" y="76" width="14" height="26" rx="4" fill="#8B4513"/>
  <rect x="74" y="79" width="12" height="23" rx="3" fill="#2D6A4F"/>
  <rect x="96" y="75" width="16" height="27" rx="5" fill="#C0392B"/>
  <rect x="122" y="77" width="13" height="25" rx="4" fill="#1A3A5C"/>
  <rect x="145" y="74" width="15" height="28" rx="4" fill="#7D3C98"/>
