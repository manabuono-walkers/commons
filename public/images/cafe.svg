<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="cafebg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A1A0E"/>
      <stop offset="100%" stop-color="#1A0E06"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C87941"/>
      <stop offset="100%" stop-color="#8B4513"/>
    </linearGradient>
    <radialGradient id="light1" cx="30%" cy="20%">
      <stop offset="0%" stop-color="#FFD080" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFD080" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="light2" cx="70%" cy="15%">
      <stop offset="0%" stop-color="#FFE0A0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFE0A0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="250" fill="url(#cafebg)"/>
  <!-- Warm lighting overlays -->
