<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="circle"><circle cx="50" cy="50" r="50"/></clipPath>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A90C4"/>
      <stop offset="100%" stop-color="#2C5F8A"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5CBA7"/>
      <stop offset="100%" stop-color="#E8A87C"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#circle)">
    <!-- Background -->
    <rect width="100" height="100" fill="url(#bg)"/>
    <!-- Shirt / collar -->
    <ellipse cx="50" cy="105" rx="38" ry="30" fill="#FFFFFF"/>
    <ellipse cx="50" cy="108" rx="28" ry="22" fill="#E8F4F8"/>
    <!-- Collar detail -->
    <polygon points="44,86 50,96 56,86" fill="#FFFFFF"/>
    <!-- Neck -->
    <rect x="44" y="72" width="12" height="16" rx="4" fill="url(#skin)"/>
    <!-- Head -->
    <ellipse cx="50" cy="55" rx="20" ry="22" fill="url(#skin)"/>
    <!-- Hair -->
    <ellipse cx="50" cy="35" rx="20" ry="12" fill="#2C1810"/>
    <rect x="30" y="35" width="5" height="14" rx="3" fill="#2C1810"/>
    <rect x="65" y="35" width="5" height="14" rx="3" fill="#2C1810"/>
    <ellipse cx="50" cy="33" rx="18" ry="10" fill="#3D2314"/>
    <!-- Ears -->
    <ellipse cx="30" cy="56" rx="4" ry="5" fill="url(#skin)"/>
    <ellipse cx="70" cy="56" rx="4" ry="5" fill="url(#skin)"/>
    <!-- Eyes -->
    <ellipse cx="43" cy="53" rx="3.5" ry="3" fill="#FFFFFF"/>
    <ellipse cx="57" cy="53" rx="3.5" ry="3" fill="#FFFFFF"/>
    <ellipse cx="43" cy="53" rx="2" ry="2.2" fill="#2C1810"/>
    <ellipse cx="57" cy="53" rx="2" ry="2.2" fill="#2C1810"/>
    <circle cx="44" cy="52" r="0.7" fill="#FFFFFF"/>
    <circle cx="58" cy="52" r="0.7" fill="#FFFFFF"/>
    <!-- Eyebrows -->
    <path d="M39 49 Q43 47 47 49" stroke="#2C1810" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M53 49 Q57 47 61 49" stroke="#2C1810" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Nose -->
    <ellipse cx="50" cy="59" rx="2" ry="1.5" fill="#D4956A" opacity="0.5"/>
    <!-- Smile -->
    <path d="M44 65 Q50 70 56 65" stroke="#C0785A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
</svg>
